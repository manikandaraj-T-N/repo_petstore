spring.datasource.url=jdbc:mysql://localhost:3306/ticketbooking
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# # Enable Spring Boot auto-config debug
# debug=true

# Your application logs
logging.level.com.supertails=DEBUG

# Thymeleaf (template issues)
logging.level.org.thymeleaf=DEBUG

# Spring MVC (controller/view flow)
logging.level.org.springframework.web=DEBUG

# Hibernate / SQL (DB queries)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE

server.servlet.session.timeout=60m
server.port=8080
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register - Supertails</title>
  <link rel="stylesheet" th:href="@{/css/variables.css}"/>
  <link rel="stylesheet" th:href="@{/css/buttons.css}"/>
  <link rel="stylesheet" th:href="@{/css/auth.css}"/>
</head>
<body>
<div layout:fragment="content">

  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="auth-logo">🐾</div>
      <h2 class="auth-title">Create Account</h2>
      <p class="auth-subtitle">Join thousands of happy pet parents</p>

      <!-- Email error -->
      <div th:if="${emailError}" class="alert alert-error" th:text="${emailError}"></div>

      <form method="post" th:action="@{/register}" th:object="${user}" class="auth-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="form-row">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" th:field="*{name}" placeholder="John Doe" required/>
            <span class="field-error" th:if="${#fields.hasErrors('name')}"
                  th:errors="*{name}"></span>
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" th:field="*{phone}" placeholder="+91 98765 43210"/>
          </div>
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <input type="email" th:field="*{email}" placeholder="you@example.com" required/>
          <span class="field-error" th:if="${#fields.hasErrors('email')}"
                th:errors="*{email}"></span>
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="input-eye">
            <input type="password" th:field="*{password}" id="regPassword"
                   placeholder="Min. 8 characters" required/>
            <span class="eye-toggle" onclick="togglePassword('regPassword', this)">👁</span>
          </div>
          <span class="field-error" th:if="${#fields.hasErrors('password')}"
                th:errors="*{password}"></span>
        </div>

        <div class="form-group">
          <label>Delivery Address</label>
          <textarea th:field="*{address}" placeholder="Enter your full address..." rows="2"></textarea>
        </div>

        <button type="submit" class="btn-auth">Create Account</button>
      </form>

      <p class="auth-switch">
        Already have an account? <a th:href="@{/login}">Login here</a>
      </p>

    </div>

    <!-- Side panel -->
    <div class="auth-panel">
      <div class="auth-panel-content">
        <h2>Welcome to the pack! 🐾</h2>
        <ul>
          <li>Track all your orders</li>
          <li>Save your addresses</li>
          <li>Member-only discounts</li>
          <li>Book vet appointments</li>
        </ul>
      </div>
    </div>

  </div>

</div>
</body>
</html>

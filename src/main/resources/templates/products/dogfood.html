<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}"
      lang="en">
<head>
  <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Shop -Supertails--Food</title>
  <link rel="stylesheet" th:href="@{/css/variables.css}"/>
  <link rel="stylesheet" th:href="@{/css/buttons.css}"/>
  <link rel="stylesheet" th:href="@{/css/products.css}"/>
</head>
<body>
<div layout:fragment="content">

  <div class="shop-layout">

    <!-- ─── Sidebar ─── -->
    <aside class="shop-sidebar">
        <input type="hidden" id="categoryId" th:value="${categoryId}">

      <div style="display:flex;align-items:center;
                  justify-content:space-between;margin-bottom:1rem;">
        <span style="font-weight:700;font-size:0.95rem;">FILTERS</span>
        <a th:href="@{/products}"
           style="font-size:0.8rem;color:var(--brand);font-weight:600;">
          Hide ✕
        </a>
      </div>

      <!-- Price Range -->
      <div class="filter-group">
        <label class="filter-group-title">Price</label>
    <input type="range"
       id="price-range-slider"
       min="0"
       max="35000"
       th:value="${param.maxPrice != null ? param.maxPrice : 35000}" style="width:100%;accent-color:var(--brand);"/>

        <div style="display:flex;justify-content:space-between;
                    font-size:0.75rem;color:var(--text-muted);margin-top:4px;">
          <span>₹0</span><span id="price-max-label">₹35,000</span>
        </div>
      </div>

      <!-- Breed Size -->
      <div class="filter-group">
        <p class="filter-group-title">Breed Size
          <span class="filter-arrow">▾</span>
        </p>
        <label class="filter-check">
          <input type="checkbox"/>
          <span>Medium</span>
          <span class="filter-count">(36)</span>
        </label>
        <label class="filter-check">
          <input type="checkbox"/>
          <span>Maxi</span>
          <span class="filter-count">(27)</span>
        </label>
        <label class="filter-check">
          <input type="checkbox"/>
          <span>Mini</span>
          <span class="filter-count">(27)</span>
        </label>
      </div>

      <!-- Veg / Non-Veg -->
      <div class="filter-group">
        <p class="filter-group-title">Veg/Non-Veg
          <span class="filter-arrow">▾</span>
        </p>
        <label class="filter-check">
          <input type="checkbox"/>
          <span>Non-Veg</span>
          <span class="filter-count">(37)</span>
        </label>

         <label class="filter-check">
          <input type="checkbox"/>
          <span>Veg</span>
          <span class="filter-count">(37)</span>
        </label>

      </div>

      <!-- Pet Type -->
      <div class="filter-group">
        <p class="filter-group-title">Pet Type
          <span class="filter-arrow">▾</span>
        </p>
        <label class="filter-check">
          <input type="checkbox"/>
          <a th:href="@{/products/category/dogs}"
             style="color:var(--text-secondary);">Dogs</a>
          <span class="filter-count">(36)</span>
        </label>
        <label class="filter-check">
          <input type="checkbox"/>
          <a th:href="@{/products/category/cats}"
             style="color:var(--text-secondary);">Cats</a>
          <span class="filter-count">(1)</span>
        </label>
      </div>

      <!-- Brand -->
    <label class="filter-check" th:each="brand : ${brands}">
    
      <input type="checkbox"/>

    <a th:href="@{/products(keyword=${brand})}"
       th:text="${brand}">
    </a>

    <span th:text="'(' + ${brandCount[brand]} + ')'"></span>

  </label>
    
    </aside>

    <!-- ─── Main Content ─── -->
    <div class="shop-main">

      <!-- Subcategory Pills -->
   <div class="food-type-pills" th:if="${breed ne 'pug'}">

  <a th:href="@{/products(breed=${breed})}"
     th:classappend="${selectedCategory == null} ? ' active' : ''"
     class="food-pill">
    <img th:src="@{/images/category/dogs/all.jpg}"
         onerror="this.src='/images/placeholder.png'" alt="All"/>
    <span>All</span>
  </a>

  <a th:href="@{/products(breed=${breed}, categoryId=1)}"
     th:classappend="${selectedCategory == 1} ? ' active' : ''"
     class="food-pill">
    <img th:src="@{/images/category/dogs/dry-food.jpg}"
         onerror="this.src='/images/placeholder.png'" alt="Dry Food"/>
    <span>Dry Food</span>
  </a>

  <a th:href="@{/products(breed=${breed}, categoryId=2)}"
     th:classappend="${selectedCategory == 2} ? ' active' : ''"
     class="food-pill">
    <img th:src="@{/images/category/dogs/wet-food.jpg}"
         onerror="this.src='/images/placeholder.png'" alt="Wet Food"/>
    <span>Wet Food</span>
  </a>

  <a th:href="@{/products(breed=${breed}, categoryId=3)}"
     th:classappend="${selectedCategory == 3} ? ' active' : ''"
     class="food-pill">
    <img th:src="@{/images/category/dogs/royal.jpg}"
         onerror="this.src='/images/placeholder.png'" alt="Royal Canin"/>
    <span>Royal Canin</span>
  </a>

  <a th:href="@{/products(breed=${breed}, categoryId=4)}"
     th:classappend="${selectedCategory == 4} ? ' active' : ''"
     class="food-pill">
    <img th:src="@{/images/category/dogs/pedigree.jpg}"
         onerror="this.src='/images/placeholder.png'" alt="Pedigree"/>
    <span>Pedigree</span>
  </a>

  <a th:href="@{/products(breed=${breed}, categoryId=5)}"
     th:classappend="${selectedCategory == 5} ? ' active' : ''"
     class="food-pill">
    <img th:src="@{/images/category/dogs/farmina.jpg}"
         onerror="this.src='/images/placeholder.png'" alt="Farmina"/>
    <span>Farmina N&amp;D</span>
  </a>

  <a th:href="@{/products(breed=${breed}, categoryId=6)}"
     th:classappend="${selectedCategory == 6} ? ' active' : ''"
     class="food-pill">
    <img th:src="@{/images/category/dogs/drools.jpg}"
         onerror="this.src='/images/placeholder.png'" alt="Drools"/>
    <span>Drools</span>
  </a>

  <a th:href="@{/products(breed=${breed}, categoryId=7)}"
     th:classappend="${selectedCategory == 7} ? ' active' : ''"
     class="food-pill">
    <img th:src="@{/images/category/dogs/bol.jpg}"
         onerror="this.src='/images/placeholder.png'" alt="BOL"/>
    <span>Bark Out Loud</span>
  </a>

    </div>

      <!-- Product Count -->
      <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:1rem;"
         th:text="${products.size()} + ' products'">0 products</p>

      <!-- Product Grid -->
      <div th:if="${products.empty}"
           style="text-align:center;padding:3rem;color:var(--text-muted);">
        <p style="font-size:3rem;">🔍</p>
        <p>No products found. Try a different filter.</p>
        <a th:href="@{/products}" class="btn btn-brand"
           style="margin-top:1rem;display:inline-block;">
          Browse All
        </a>
      </div>

      <div th:unless="${products.empty}" class="product-grid">
        <div th:each="product : ${products}" class="product-card">

          <a th:href="@{/products/{id}(id=${product.id})}">
            <div class="product-img-wrap img-bg-purple">
              <img th:if="${product.imageUrl != null}"
                    th:src="@{${product.imageUrl}}"
                    th:alt="${product.name}"
                    onerror="this.src='/images/placeholder.png'"/>
                   
              <span th:if="${product.imageUrl == null}"
                    class="product-img-placeholder">🐾</span>

                 
            </div>
             
            <div class="product-body">
              <span class="product-tag tag-food"
                    th:text="${product.category?.name}">Tag</span>
              <p class="product-name" th:text="${product.name}">Name</p>
              <p class="product-price"
                 th:text="'₹' + ${product.price}">₹0</p>
            </div>
          </a>

          <div style="padding:0 1rem 1rem;">
            <form method="post" th:action="@{/cart/add}">
              <input type="hidden" name="productId" th:value="${product.id}"/>
            
              <button type="submit"
                      class="btn-add btn-add-purple"
                      style="width:100%;">
                Add to cart
              </button>
            </form>
          </div>

        </div>
      </div>

    </div>
  </div>

</div>

<!-- ========================script========================= -->
<!-- <script th:src="@{/js/sidebar.js}" defer></script> -->
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title layout:title-pattern="$CONTENT_TITLE - Supertails"></title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link rel="stylesheet" th:href="@{/css/navbar.css}"/>
</head>
<body>

  <!-- Shared Navbar -->
  <div th:replace="~{fragments/navbar :: navbar}"></div>

  <!-- Page Content -->
  <main layout:fragment="content" class="page-content">
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-inner">
      <p>🐾 &copy; 2025 Supertails. All rights reserved.</p>
      <div>
        <a th:href="@{/}">Home</a>
        <a th:href="@{/products}">Shop</a>
        <a th:href="@{/services}">Vet Services</a>
        <a th:href="@{/orders}">Track Order</a>
      </div>
    </div>
  </footer>

  <script th:src="@{/js/navbar.js}"></script>
  <th:block layout:fragment="scripts"></th:block> 
</body>
</html>

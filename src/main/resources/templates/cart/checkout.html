<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}"
      lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Checkout - Supertails</title>

  <!-- CSS links -->
  <link rel="stylesheet" th:href="@{/css/variables.css}"/>
  <link rel="stylesheet" th:href="@{/css/buttons.css}"/>
  <link rel="stylesheet" th:href="@{/css/cart.css}"/>
</head>
<body>
<div layout:fragment="content">

  <div class="checkout-wrap">

    <!-- ─── Left: Steps ─── -->
    <div>
      <h1 class="cart-title">📦 Checkout</h1>

      <!-- Step 1: Shipping -->
<div class="checkout-section">
  <h3>
    <span class="step-num">1</span>
    Shipping Address
  </h3>

  <form method="post" th:action="@{/cart/checkout}" id="checkoutForm">
    <input type="hidden"
           th:name="${_csrf.parameterName}"
           th:value="${_csrf.token}"/>

    <!-- Row 1: Name + Phone -->
    <div style="display:grid;grid-template-columns:1fr 1fr;
                gap:1rem;margin-bottom:1rem;">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="fullName"
               placeholder="John Doe" required/>
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" name="phone"
               placeholder="+91 98765 43210" required/>
      </div>
    </div>

    <!-- Full Address -->
    <div class="form-group" style="margin-bottom:1rem;">
      <label>Full Address</label>
      <textarea name="shippingAddress" rows="3" required
                placeholder="House no, Street, Area, City, State, Pincode">
      </textarea>
    </div>

    <!-- Row 2: City + State + Pincode -->
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;">
      <div class="form-group">
        <label>City</label>
        <input type="text" name="city" placeholder="Mumbai"/>
      </div>
      <div class="form-group">
        <label>State</label>
        <input type="text" name="state" placeholder="Maharashtra"/>
      </div>
      <div class="form-group">
        <label>Pincode</label>
        <input type="text" name="pincode"
               placeholder="400001" maxlength="6"/>
      </div>
    </div>

  </form>
</div>

      <!-- Step 2: Payment -->
      <div class="checkout-section">
        <h3>
          <span class="step-num">2</span>
          Payment Method
        </h3>

        <!-- COD -->
        <label style="display:flex;align-items:center;gap:12px;
                      padding:1rem;margin-bottom:0.75rem;cursor:pointer;
                      border:1.5px solid var(--brand);
                      border-radius:10px;
                      background:var(--brand-soft);">
          <input type="radio" name="payment" value="cod" checked
                 style="accent-color:var(--brand);width:16px;height:16px;"/>
          <div>
            <p style="font-weight:700;font-size:0.9rem;
                      color:var(--dark);">💵 Cash on Delivery</p>
            <p style="font-size:0.78rem;
                      color:var(--text-muted);">Pay when your order arrives</p>
          </div>
        </label>

        <!-- UPI -->
        <label style="display:flex;align-items:center;gap:12px;
                      padding:1rem;margin-bottom:0.75rem;cursor:pointer;
                      border:1.5px solid var(--border);
                      border-radius:10px;">
          <input type="radio" name="payment" value="upi"
                 style="accent-color:var(--brand);width:16px;height:16px;"/>
          <div>
            <p style="font-weight:700;font-size:0.9rem;
                      color:var(--dark);">📱 UPI / Wallet</p>
            <p style="font-size:0.78rem;
                      color:var(--text-muted);">Google Pay, PhonePe, Paytm</p>
          </div>
        </label>

        <!-- Card -->
        <label style="display:flex;align-items:center;gap:12px;
                      padding:1rem;cursor:pointer;
                      border:1.5px solid var(--border);
                      border-radius:10px;">
          <input type="radio" name="payment" value="card"
                 style="accent-color:var(--brand);width:16px;height:16px;"/>
          <div>
            <p style="font-weight:700;font-size:0.9rem;
                      color:var(--dark);">💳 Credit / Debit Card</p>
            <p style="font-size:0.78rem;
                      color:var(--text-muted);">Visa, Mastercard, Rupay</p>
          </div>
        </label>

      </div>

      <!-- Place Order Button -->
      <button type="submit" form="checkoutForm"
              class="btn btn-brand btn-lg"
              style="width:100%;justify-content:center;display:flex;">
        🎉 Place Order
      </button>

    </div>

    <!-- ─── Right: Order Summary ─── -->
    <div>
      <div class="order-summary">
        <h3>Order Summary</h3>

        <!-- Items -->
        <div th:each="item : ${cart.items}" class="summary-row">
          <span style="display:flex;align-items:center;gap:6px;">
            <span style="background:var(--brand-pale);color:var(--brand);
                         font-size:0.72rem;font-weight:700;
                         padding:1px 6px;border-radius:4px;"
                  th:text="'x' + ${item.quantity}">x1</span>
            <span th:text="${item.product.name}">Product</span>
          </span>
          <span th:text="'₹' + ${#numbers.formatDecimal(item.subtotal,1,2)}">₹0</span>
        </div>

        <!-- Subtotal -->
        <div class="summary-row">
          <span>Subtotal</span>
          <span th:text="'₹' + ${#numbers.formatDecimal(cart.totalPrice,1,2)}">₹0</span>
        </div>

        <!-- Delivery -->
        <div class="summary-row">
          <span>Delivery</span>
          <span style="color:var(--green);font-weight:700;">FREE</span>
        </div>

        <!-- Total -->
        <div class="summary-row total">
          <span>Total Payable</span>
          <span th:text="'₹' + ${#numbers.formatDecimal(cart.totalPrice,1,2)}">₹0</span>
        </div>

        <!-- Security note -->
        <div style="margin-top:1.25rem;padding-top:1rem;
                    border-top:1px solid var(--border);
                    font-size:0.78rem;color:var(--text-muted);line-height:1.6;">
          🔒 Your personal data is protected.<br/>
          By placing this order you agree to our
          <a href="#" style="color:var(--brand);">Terms &amp; Conditions</a>.
        </div>

      </div>
    </div>

  </div>

</div>
</body>
</html>

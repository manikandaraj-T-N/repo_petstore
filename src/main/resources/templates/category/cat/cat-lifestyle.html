<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}"
      lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Cat Lifestyle - Supertails</title>
  <link rel="stylesheet" th:href="@{/css/variables.css}"/>
  <link rel="stylesheet" th:href="@{/css/buttons.css}"/>
  <link rel="stylesheet" th:href="@{/css/products.css}"/>
  <link rel="stylesheet" th:href="@{/css/category.css}"/>
</head>
<body>
<div layout:fragment="content">

  <!-- ── Section Pills ── -->

  <div class="food-type-pills" th:if="${section == 'beds'}">
  <a th:href="@{/category/cat/lifestyle(section='beds')}"
     th:classappend="${selectedCategory == null} ? ' active' : ''"
     class="food-pill">
    <img th:src="@{/images/category/cats/lifestyle/all-bed.jpg}" onerror="this.src='/images/placeholder.png'" alt="All"/>
    <span>All</span>
  </a>
  <a th:href="@{/category/cat/lifestyle(section='beds', categoryId=140)}"
     th:classappend="${selectedCategory == 140} ? ' active' : ''"
     class="food-pill">
    <img th:src="@{/images/category/cats/lifestyle/blankets.jpg}" onerror="this.src='/images/placeholder.png'" alt="Blankets &amp; Cushions"/>
    <span>Blankets &amp; Cushions</span>
  </a>
  <a th:href="@{/category/cat/lifestyle(section='beds', categoryId=141)}"
     th:classappend="${selectedCategory == 141} ? ' active' : ''"
     class="food-pill">
    <img th:src="@{/images/category/cats/lifestyle/designer-beds.jpg}" onerror="this.src='/images/placeholder.png'" alt="Designer Beds"/>
    <span>Designer Beds</span>
  </a>
  <a th:href="@{/category/cat/lifestyle(section='beds', categoryId=142)}"
     th:classappend="${selectedCategory == 142} ? ' active' : ''"
     class="food-pill">
    <img th:src="@{/images/category/cats/lifestyle/elevated-beds.jpg}" onerror="this.src='/images/placeholder.png'" alt="Elevated Beds"/>
    <span>Elevated Beds</span>
  </a>
</div>

  <div class="food-type-pills" th:if="${section == 'toys'}">
  <a th:href="@{/category/cat/lifestyle(section='toys')}"
     th:classappend="${selectedCategory == null} ? ' active' : ''"
     class="food-pill">
    <img th:src="@{/images/category/cats/lifestyle/all-toys.jpg}" onerror="this.src='/images/placeholder.png'" alt="All"/>
    <span>All</span>
  </a>
  <a th:href="@{/category/cat/lifestyle(section='toys', categoryId=143)}"
     th:classappend="${selectedCategory == 143} ? ' active' : ''"
     class="food-pill">
    <img th:src="@{/images/category/cats/lifestyle/catnip.jpg}" onerror="this.src='/images/placeholder.png'" alt="Catnip Toys"/>
    <span>Catnip Toys</span>
  </a>
  <a th:href="@{/category/cat/lifestyle(section='toys', categoryId=144)}"
     th:classappend="${selectedCategory == 144} ? ' active' : ''"
     class="food-pill">
    <img th:src="@{/images/category/cats/lifestyle/cat-trees.jpg}" onerror="this.src='/images/placeholder.png'" alt="Cat Trees"/>
    <span>Cat Trees</span>
  </a>
</div>


<div class="food-type-pills" th:if="${section == 'walk'}">
  <a th:href="@{/category/cat/lifestyle(section='walk')}"
     th:classappend="${selectedCategory == null} ? ' active' : ''"
     class="food-pill">
    <img th:src="@{/images/category/cats/lifestyle/all-walk.jpg}" onerror="this.src='/images/placeholder.png'" alt="All"/>
    <span>All</span>
  </a>
  <a th:href="@{/category/cat/lifestyle(section='walk', categoryId=146)}"
     th:classappend="${selectedCategory == 146} ? ' active' : ''"
     class="food-pill">
    <img th:src="@{/images/category/cats/lifestyle/collars.jpg}" onerror="this.src='/images/placeholder.png'" alt="Collars"/>
    <span>Collars</span>
  </a>
  <a th:href="@{/category/cat/lifestyle(section='walk', categoryId=147)}"
     th:classappend="${selectedCategory == 147} ? ' active' : ''"
     class="food-pill">
    <img th:src="@{/images/category/cats/lifestyle/harness.jpg}" onerror="this.src='/images/placeholder.png'" alt="Harness"/>
    <span>Harness</span>
  </a>
  <a th:href="@{/category/cat/lifestyle(section='walk', categoryId=148)}"
     th:classappend="${selectedCategory == 148} ? ' active' : ''"
     class="food-pill">
    <img th:src="@{/images/category/cats/lifestyle/leash-harness.jpg}" onerror="this.src='/images/placeholder.png'" alt="Leash Harness Set"/>
    <span>Leash Harness Set</span>
  </a>
  <!-- <a th:href="@{/category/cat/lifestyle(section='walk', categoryId=149)}"
     th:classappend="${selectedCategory == 149} ? ' active' : ''"
     class="food-pill">
    <img th:src="@{/images/category/cats/lifestyle/retractable.jpg}" onerror="this.src='/images/placeholder.png'" alt="Retractable Leash"/>
    <span>Retractable Leash</span> -->
  </a>
</div>
  

  <div class="food-type-pills" th:if="${section == 'bowls'}">
  <a th:href="@{/category/cat/lifestyle(section='bowls')}"
     th:classappend="${selectedCategory == null} ? ' active' : ''"
     class="food-pill">
    <img th:src="@{/images/category/cats/essentials/all.jpg}" onerror="this.src='/images/placeholder.png'" alt="All"/>
    <span>All</span>
  </a>
  <a th:href="@{/category/cat/lifestyle(section='bowls', categoryId=150)}"
     th:classappend="${selectedCategory == 150} ? ' active' : ''"
     class="food-pill">
    <img th:src="@{/images/category/cats/lifestyle/water-fountain.jpg}" onerror="this.src='/images/placeholder.png'" alt="Water Fountain"/>
    <span>Water Fountain</span>
  </a>
  <a th:href="@{/category/cat/lifestyle(section='bowls', categoryId=151)}"
     th:classappend="${selectedCategory == 151} ? ' active' : ''"
     class="food-pill">
    <img th:src="@{/images/category/cats/lifestyle/anti-skid.jpg}" onerror="this.src='/images/placeholder.png'" alt="Anti-Skid"/>
    <span>Anti-Skid</span>
  </a>
  <a th:href="@{/category/cat/lifestyle(section='bowls', categoryId=152)}"
     th:classappend="${selectedCategory == 152} ? ' active' : ''"
     class="food-pill">
    <img th:src="@{/images/category/cats/lifestyle/designer-bowls.jpg}" onerror="this.src='/images/placeholder.png'" alt="Designer Bowls"/>
    <span>Designer Bowls</span>
  </a>
</div>


<div class="food-type-pills" th:if="${section == 'bath'}">
  <a th:href="@{/category/dog/grooming(section='bath')}"
     th:classappend="${selectedCategory == null} ? ' active' : ''"
     class="food-pill">
    <img th:src="@{/images/category/cats/lifestyle/all-bath.jpg}" onerror="this.src='/images/placeholder.png'" alt="All"/>
    <span>All</span>
  </a>
  <a th:href="@{/category/dog/grooming(section='bath', categoryId=154)}"
     th:classappend="${selectedCategory == 154} ? ' active' : ''"
     class="food-pill">
    <img th:src="@{/images/category/cats/lifestyle/brushes.jpg}" onerror="this.src='/images/placeholder.png'" alt="Brushes & Combs"/>
    <span>Brushes &amp; Combs</span>
  </a>
  <a th:href="@{/category/dog/grooming(section='bath', categoryId=155)}"
     th:classappend="${selectedCategory == 155} ? ' active' : ''"
     class="food-pill">
    <img th:src="@{/images/category/cats/lifestyle/shampoos.jpg}" onerror="this.src='/images/placeholder.png'" alt="Shampoos & Conditioners"/>
    <span>Shampoos &amp; Conditioners</span>
  </a>
</div>




  <!-- Product Count -->
  <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:1rem;"
     th:text="${products.size()} + ' products'">0 products</p>

  <!-- Empty State -->
  <div th:if="${products.empty}"
       style="text-align:center;padding:3rem;color:var(--text-muted);">
    <p style="font-size:3rem;">🔍</p>
    <p>No products found. Try a different filter.</p>
    <a th:href="@{/category/cat/lifestyle(section='summerwear')}" class="btn btn-brand"
       style="margin-top:1rem;display:inline-block;">Browse All</a>
  </div>

  <!-- Product Grid -->
  <div th:unless="${products.empty}" class="product-grid">
    <div th:each="product : ${products}" class="product-card">

      <a th:href="@{/products/{id}(id=${product.id})}">
        <div class="product-img-wrap img-bg-purple">
          <img th:if="${product.imageUrl != null}"
               th:src="@{${product.imageUrl}}"
               th:alt="${product.name}"
               onerror="this.src='/images/placeholder.png'"/>
          <span th:if="${product.imageUrl == null}"
                class="product-img-placeholder">🐾</span>
        </div>
        <div class="product-body">
          <span class="product-tag tag-food"
                th:text="${product.category?.name}">Tag</span>
          <p class="product-name" th:text="${product.name}">Name</p>
          <p class="product-price"
             th:text="'₹' + ${product.price}">₹0</p>
        </div>
      </a>

      <div style="padding:0 1rem 1rem;">
        <form method="post" th:action="@{/cart/add}">
          <input type="hidden" name="productId" th:value="${product.id}"/>
          <button type="submit" class="btn-add btn-add-purple" style="width:100%;">
            Add to cart
          </button>
        </form>
      </div>

    </div>
  </div>

</div>
</body>
</html>

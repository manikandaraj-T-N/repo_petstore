<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Manage Orders - Supertails</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="admin-layout">
    <aside class="sidebar">
        <h2>🐾 Supertails</h2>
        <nav>
            <a th:href="@{/admin}">Dashboard</a>
            <a th:href="@{/admin/products}">Products</a>
            <a th:href="@{/admin/orders}">Orders</a>
            <a th:href="@{/admin/users}">Users</a>
            <a th:href="@{/logout}">Logout</a>
        </nav>
    </aside>

    <main class="admin-main">
        <h1>Manage Orders</h1>

        <div th:if="${param.updated}" style="color:green;">✅ Order status updated.</div>

        <!-- Filter by status -->
        <form method="get" th:action="@{/admin/orders}">
            <select name="status" onchange="this.form.submit()" title="status">
                <option value="">All Statuses</option>
                <option th:each="s : ${statuses}"
                        th:value="${s}"
                        th:text="${s}"
                        th:selected="${selectedStatus == s.name()}">
                </option>
            </select>
        </form>

        <table>
            <thead>
                <tr>
                    <th>Order #</th>
                    <th>Customer</th>
                    <th>Items</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Date</th>
                    <th>Update Status</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="order : ${orders}">
                    <td th:text="'#' + ${order.id}">ID</td>
                    <td th:text="${order.user.name}">Customer</td>
                    <td th:text="${order.items.size()}">Items</td>
                    <td th:text="'₹' + ${order.totalAmount}">Total</td>
                    <td>
                        <span th:text="${order.status}"
                              th:classappend="${order.status.name() == 'DELIVERED'} ? 'badge-green' :
                                             (${order.status.name() == 'CANCELLED'} ? 'badge-red' : 'badge-blue')">
                        </span>
                    </td>
                    <td th:text="${#temporals.format(order.placedAt, 'dd MMM yyyy')}">Date</td>
                    <td>
                        <form method="post" th:action="@{/admin/orders/{id}/status(id=${order.id})}">
                            
                            <select name="status" title="Update Status">
                                <option th:each="s : ${statuses}"
                                        th:value="${s}"
                                        th:text="${s}"
                                        th:selected="${order.status == s}">
                                </option>
                            </select>
                            <button type="submit">Update</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </main>
</div>
</body>
</html>

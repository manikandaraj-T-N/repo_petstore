<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset=UTF-8>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Products - Supertails</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="admin-layout">
    <aside class="sidebar">
        <h2>🐾 Supertails</h2>
        <nav>
            <a th:href="@{/admin}">Dashboard</a>
            <a th:href="@{/admin/products}">Products</a>
            <a th:href="@{/admin/orders}">Orders</a>
            <a th:href="@{/admin/users}">Users</a>
            <a th:href="@{/logout}">Logout</a>
        </nav>
    </aside>

    <main class="admin-main">
        <h1>Manage Products</h1>

        <div th:if="${param.saved}"   style="color:green;">✅ Product saved.</div>
        <div th:if="${param.deleted}" style="color:red;">🗑 Product deleted.</div>
        <div th:if="${param.updated}" style="color:blue;">✏️ Product updated.</div>

        <a th:href="@{/admin/products/edit/new}" class="btn">+ Add New Product</a>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Stock</th>
                    <th>Type</th>
                    <th>Available</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="product : ${products}">
                    <td th:text="${product.id}">1</td>
                    <td th:text="${product.name}">Name</td>
                    <td th:text="${product.category?.name}">Cat</td>
                    <td th:text="'₹' + ${product.price}">Price</td>
                    <td th:text="${product.stock}">Stock</td>
                    <td th:text="${product.type}">Type</td>
                    <td th:text="${product.available} ? 'Yes' : 'No'">Yes</td>
                    <td>
                        <a th:href="@{/admin/products/edit/{id}(id=${product.id})}">Edit</a>
                        <form method="post"
                              th:action="@{/admin/products/delete/{id}(id=${product.id})}"
                              style="display:inline"
                              onsubmit="return confirm('Delete this product?')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit">Delete</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </main>
</div>
</body>
</html>
